<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>定期巡回報告書 入力フォーム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap');

  :root {
    --ink: #1a1a2e;
    --ink-light: #4a4a6a;
    --accent: #2c5f8a;
    --accent-hover: #1e4a6e;
    --accent-light: #e8f0f7;
    --warn: #c0392b;
    --warn-b: #e67e22;
    --warn-a: #27ae60;
    --border: #c8cfd8;
    --bg: #f4f6f9;
    --white: #ffffff;
    --header-bg: #1a3a5c;
    --section-bg: #2c5f8a;
    --row-alt: #f8fafc;
    --shadow: 0 2px 12px rgba(26,58,92,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 13px;
    min-height: 100vh;
  }

  /* ===== TOP BAR ===== */
  .top-bar {
    background: var(--header-bg);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 3px 16px rgba(0,0,0,0.25);
  }
  .top-bar h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.12em;
  }
  .top-bar .actions { display: flex; gap: 10px; }
  .btn {
    padding: 8px 20px;
    border: none;
    border-radius: 6px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-primary {
    background: #e8a020;
    color: #1a1a2e;
  }
  .btn-primary:hover { background: #d4901a; transform: translateY(-1px); }
  .btn-secondary {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.25); }

  .save-status {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .save-status.saved { color: #7fd4a0; }
  .save-status.saving { color: #f0c870; }

  /* ===== MAIN WRAPPER ===== */
  .wrapper {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ===== CARD ===== */
  .card {
    background: var(--white);
    border-radius: 12px;
    box-shadow: var(--shadow);
    /* overflow:hidden を削除 — 印刷時にBlock Formatting Contextが強制改ページを引き起こす */
    margin-bottom: 20px;
  }

  .card-header {
    background: var(--section-bg);
    color: white;
    padding: 11px 20px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 8px;
    border-radius: 12px 12px 0 0;  /* カード上部の角丸をheaderで担う */
  }
  .card-header::before {
    content: '';
    width: 4px; height: 16px;
    background: #e8a020;
    border-radius: 2px;
    display: inline-block;
  }

  /* ===== HEADER INFO GRID ===== */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .info-cell {
    padding: 14px 16px;
    border-right: 1px solid var(--border);
  }
  .info-cell:last-child { border-right: none; }
  .info-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-light);
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .info-input {
    width: 100%;
    border: none;
    border-bottom: 2px solid var(--border);
    padding: 4px 0;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: transparent;
    outline: none;
    transition: border-color 0.2s;
  }
  .info-input:focus { border-bottom-color: var(--accent); }

  /* ===== PHOTO GRID ===== */
  .photo-section { padding: 20px; }
  .photo-grid { display: block; }
  .photo-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 14px;
  }
  .photo-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .photo-box {
    width: 100%;
    aspect-ratio: 4/3;
    border: 2px dashed var(--border);
    border-radius: 8px;
    background: var(--row-alt);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }
  .photo-box:hover { border-color: var(--accent); background: var(--accent-light); }
  .photo-box.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
    transform: scale(1.02);
    box-shadow: 0 0 0 3px rgba(44,95,138,0.2);
  }
  .photo-box img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 6px;
  }
  .photo-box input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }
  .photo-placeholder {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    color: var(--ink-light);
    pointer-events: none;
  }
  .photo-placeholder svg { opacity: 0.4; }
  .photo-placeholder span { font-size: 11px; }
  .photo-caption {
    margin-top: 2px;
  }
  .photo-slot-del {
    margin-top: 2px;
    width: 100%;
    background: none;
    border: 1px dashed #ccc;
    border-radius: 6px;
    padding: 4px 0;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    color: #aaa;
    cursor: pointer;
    transition: all 0.15s;
  }
  .photo-slot-del:hover {
    border-color: var(--warn);
    color: var(--warn);
    background: #fce8e8;
  }
  .photo-caption input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: var(--ink);
    background: var(--white);
    outline: none;
    text-align: center;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .photo-caption input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(44,95,138,0.12);
  }
  .photo-caption input::placeholder {
    color: #aab0bc;
  }
  .photo-remove {
    position: absolute; top: 5px; right: 5px;
    background: rgba(0,0,0,0.55);
    color: white;
    border: none; border-radius: 50%;
    width: 22px; height: 22px;
    font-size: 13px; line-height: 22px;
    text-align: center; cursor: pointer;
    display: none; z-index: 2;
  }
  .photo-box.has-image .photo-remove { display: block; }
  .photo-box.has-image .photo-placeholder { display: none; }

  /* ===== INSPECTION TABLE ===== */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  thead tr { background: #edf2f7; }
  th {
    padding: 9px 8px;
    text-align: center;
    font-weight: 700;
    color: var(--ink);
    border: 1px solid var(--border);
    white-space: nowrap;
    font-size: 11.5px;
  }
  td {
    padding: 6px 8px;
    border: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:nth-child(even) td { background: var(--row-alt); }

  .section-row td {
    background: #dce8f5 !important;
    font-weight: 700;
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 0.04em;
    padding: 5px 10px;
  }
  .section-row .section-cell {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-row .section-input {
    background: transparent;
    border: 1.5px solid transparent;
    border-radius: 5px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    flex: 1;
    outline: none;
    padding: 3px 6px;
    transition: border-color 0.2s, background 0.2s;
  }
  .section-row .section-input:hover {
    border-color: rgba(44,95,138,0.3);
    background: rgba(255,255,255,0.5);
  }
  .section-row .section-input:focus {
    border-color: var(--accent);
    background: white;
  }
  .del-section-btn {
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    font-size: 13px;
    padding: 2px 5px;
    border-radius: 4px;
    transition: all 0.15s;
    opacity: 0.5;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .del-section-btn:hover { color: var(--warn); background: #fce8e8; opacity: 1; }

  td input[type=text], td textarea {
    width: 100%;
    border: 1.5px solid transparent;
    border-radius: 4px;
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12.5px;
    color: var(--ink);
    outline: none;
    resize: none;
    padding: 2px 4px;
    transition: border-color 0.15s, background 0.15s;
  }
  td input[type=text]:hover, td textarea:hover {
    border-color: rgba(44,95,138,0.25);
    background: rgba(255,255,255,0.7);
  }
  td input[type=text]:focus, td textarea:focus {
    border-color: var(--accent);
    background: white;
  }
  td textarea {
    min-height: 34px;
    line-height: 1.55;
    overflow: hidden;
  }

  /* Method checkboxes */
  .method-checks {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .method-checks label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    color: var(--ink);
  }
  .method-checks input[type=checkbox] {
    accent-color: var(--accent);
    width: 13px; height: 13px;
    cursor: pointer;
  }

  /* Status toggle button */
  .status-toggle {
    display: flex;
    justify-content: center;
  }
  .toggle-btn {
    border: none;
    border-radius: 20px;
    padding: 4px 11px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.03em;
    min-width: 52px;
    white-space: nowrap;
  }
  .toggle-btn.is-ok {
    background: #dcf5e7;
    color: #1a7a40;
    border: 1.5px solid #7fd4a0;
  }
  .toggle-btn.is-ok:hover { background: #c5edd8; }
  .toggle-btn.is-ng {
    background: #fce8e8;
    color: #b32020;
    border: 1.5px solid #f0a0a0;
  }
  .toggle-btn.is-ng:hover { background: #f8d5d5; }

  /* Problem level select */
  .level-select {
    border: 1.5px solid var(--border);
    border-radius: 5px;
    background: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    width: 100%;
    text-align: center;
    cursor: pointer;
    padding: 4px 2px;
    transition: border-color 0.15s, opacity 0.15s;
    -webkit-appearance: auto;
    appearance: auto;
  }
  .level-select.locked {
    opacity: 0.28;
    pointer-events: none;
    background: #f0f0f0;
    cursor: default;
  }
  .level-select:not(.locked):hover { border-color: var(--accent); }
  .level-select:not(.locked):focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(44,95,138,0.15); }
  .level-C { color: var(--warn); font-weight: 700; border-color: #f0a0a0 !important; background: #fff5f5 !important; }
  .level-B { color: var(--warn-b); font-weight: 700; border-color: #f0c870 !important; background: #fffbf0 !important; }
  .level-A { color: var(--warn-a); font-weight: 700; border-color: #7fd4a0 !important; background: #f0faf5 !important; }

  /* Photo checkbox */
  .photo-check { display: flex; justify-content: center; }
  .photo-check input { accent-color: var(--accent); width: 14px; height: 14px; }

  /* Delete row button */
  .del-row-btn {
    background: none;
    border: none;
    color: #cc4444;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: background 0.15s;
    opacity: 0.5;
  }
  .del-row-btn:hover { background: #fce8e8; opacity: 1; }

  /* Add row area */
  .add-row-area {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--border);
    background: #f8fafc;
    flex-wrap: wrap;
  }
  .add-row-label { font-size: 12px; color: var(--ink-light); font-weight: 500; }
  .section-select-add {
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: var(--ink);
    background: white;
    outline: none;
    cursor: pointer;
  }
  .section-select-add:focus { border-color: var(--accent); }
  .btn-add-row {
    padding: 6px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.18s;
  }
  .btn-add-row:hover { background: var(--accent-hover); }

  /* ===== REMARKS ===== */
  .remarks-area {
    padding: 18px 20px;
  }
  .remarks-area textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--ink);
    min-height: 100px;
    outline: none;
    resize: vertical;
    transition: border-color 0.2s;
    line-height: 1.7;
  }
  .remarks-area textarea:focus { border-color: var(--accent); }

  /* ===== LEGEND ===== */
  .legend {
    padding: 12px 20px;
    display: flex;
    gap: 24px;
    background: #f8fafc;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--ink-light);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-badge {
    width: 20px; height: 20px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px;
  }

  /* ===== ADD PHOTO BUTTON ===== */
  .add-photo-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px;
    border: 2px dashed var(--border);
    border-radius: 8px;
    background: var(--row-alt);
    color: var(--ink-light);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    transition: all 0.2s;
    width: 100%;
    margin-top: 12px;
  }
  .add-photo-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* ===== PRINT STYLES ===== */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    body { background: white; font-size: 9pt; margin: 0; padding: 0; }

    /* ヘッダー非表示・レイアウト完全排除 */
    .top-bar { display: none !important; }

    .wrapper { width: 100%; max-width: 100%; padding: 0; margin: 0; }

    /* カード — overflow絶対に使わない */
    .card {
      box-shadow: none !important;
      border: 1px solid #bbb;
      border-radius: 4px;
      margin: 0 0 5px 0;
      padding: 0;
      background: white;
    }
    .card-header {
      border-radius: 4px 4px 0 0;
      padding: 6px 14px;
      font-size: 10pt;
      page-break-after: avoid;
      break-after: avoid;
    }
    .card-header::before { display: none; }

    /* 基本情報 */
    .info-grid { grid-template-columns: 1fr 2fr 1fr 1fr; }
    .info-cell { padding: 8px 12px; }
    .info-label { font-size: 7.5pt; margin-bottom: 3px; }
    .info-input {
      font-size: 10pt;
      white-space: normal;
      word-break: break-all;
      border: none !important;
      border-bottom: 1px solid #999 !important;
    }

    /* 写真グリッド — 行単位で改ページ禁止 */
    .photo-section { padding: 8px 10px; }
    .photo-grid { display: block; }
    .photo-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 6px;
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .photo-item { gap: 3px; }
    .photo-box {
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .photo-box input[type=file] { display: none; }
    .photo-remove { display: none !important; }
    .photo-placeholder { display: none !important; }
    .photo-box img { width: 100%; height: 100%; object-fit: cover; }
    .photo-caption input {
      border: none !important;
      font-size: 8pt;
      text-align: center;
    }

    /* ボタン・操作UI非表示 */
    .add-photo-btn,
    .add-row-area,
    .del-row-btn,
    .del-section-btn,
    .photo-slot-del { display: none !important; }

    /* テーブル */
    td input[type=text], td textarea, .level-select {
      border: none !important;
      box-shadow: none !important;
      background: transparent !important;
    }
    .level-select.locked { opacity: 0.4; }
    .toggle-btn {
      border: 1px solid #ccc !important;
      font-size: 8pt !important;
      padding: 2px 5px !important;
      border-radius: 10px !important;
    }
    .section-row td { background: #dce8f5 !important; }
    .table-wrap { overflow: visible; }

    table { page-break-inside: auto; break-inside: auto; width: 100%; font-size: 8pt; }
    thead { display: table-header-group; }
    th { padding: 5px 4px; font-size: 8pt; }
    td { padding: 4px 5px; }
    tr { page-break-inside: avoid; break-inside: avoid; }
    .section-row { page-break-after: avoid; break-after: avoid; }

    .legend { padding: 4px 10px; font-size: 7.5pt; }
    .add-row-area { display: none !important; }
    .remarks-area { padding: 10px 14px; }
    .remarks-area textarea {
      border: 1px solid #bbb !important;
      min-height: 50px;
      font-size: 9pt;
    }

    @page { margin: 8mm 8mm; size: A4; }
  }

  /* Column widths */
  .col-no { width: 32px; text-align: center; }
  .col-location { width: 175px; }
  .col-method { width: 80px; }
  .col-content { width: 220px; }
  .col-status { width: 72px; text-align: center; }
  .col-level { width: 88px; text-align: center; }
  .col-photo { width: 40px; text-align: center; }
  .col-report { min-width: 85px; }
  .col-del { width: 30px; text-align: center; }

  /* ===== MOBILE RESPONSIVE ===== */
  @media screen and (max-width: 767px) {

    /* トップバー：縦並び */
    .top-bar {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      position: relative;
    }
    .top-bar h1 { font-size: 14px; }
    .top-bar .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
    }
    .save-status {
      grid-column: 1 / -1;
      font-size: 11px;
      justify-content: center;
    }
    .btn { padding: 9px 10px; font-size: 12px; justify-content: center; }

    /* ラッパー余白 */
    .wrapper { padding: 12px 10px 40px; }

    /* 基本情報：1列 */
    .info-grid { grid-template-columns: 1fr; }
    .info-cell { border-right: none; border-bottom: 1px solid var(--border); }
    .info-cell:last-child { border-bottom: none; }
    .info-input { font-size: 15px; }

    /* 写真グリッド：2列 */
    .photo-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .photo-section { padding: 12px; }
    .add-photo-btn { font-size: 13px; padding: 12px; }

    /* 点検テーブル：カード型に変換 */
    .table-wrap { overflow-x: visible; }
    table, thead, tbody, th, td, tr { display: block; width: 100%; }
    thead { display: none; }   /* ヘッダー行を非表示 */

    #inspection-body tr:not(.section-row) {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    #inspection-body tr:not(.section-row):nth-child(even) {
      background: white;
    }

    /* セクション行 */
    .section-row {
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .section-row td { padding: 8px 12px; }

    /* 各セルをラベル付きで表示 */
    #inspection-body tr:not(.section-row) td {
      border: none;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
    }
    #inspection-body tr:not(.section-row) td::before {
      content: attr(data-label);
      font-size: 10px;
      font-weight: 700;
      color: var(--ink-light);
      min-width: 68px;
      flex-shrink: 0;

    /* No列は非表示 */
    .col-no { display: none !important; }

    /* 点検箇所・内容 */
    .col-location input,
    .col-content textarea {
      font-size: 14px;

      background: var(--row-alt) !important;

    .col-content textarea:focus {
      border-color: var(--accent) !important;
      background: white !important;
    }

    /* 点検方法 */
    .method-checks { flex-direction: row; gap: 12px; }

    /* 問題の有無・程度 */
    .col-status, .col-level {
      width: 100%;
      justify-content: flex-start;
    }
    .status-toggle { justify-content: flex-start; }
    .toggle-btn { font-size: 13px; padding: 6px 16px; }
    .level-select { width: auto; min-width: 120px; font-size: 13px; padding: 6px 8px; }

    /* 報告事項 */

      border: 1.5px solid var(--border) !important;
      border-radius: 6px !important;

      padding: 6px 8px !important;
      font-size: 13px;

    /* 削除ボタン */

    /* 写真チェック */
    .col-photo { justify-content: flex-start; }
    .photo-check input { width: 18px; height: 18px; }

    /* 行追加エリア */
    .add-row-area { flex-wrap: wrap; gap: 8px; }
    .section-select-add { width: 100%; }

  /* 極小画面（〜374px） */

</style>

<body>

<div class="top-bar">
  <h1>📋 定期巡回報告書 入力フォーム</h1>
  <div class="actions">
    <span class="save-status" id="save-status"></span>
    <label class="btn btn-secondary" style="cursor:pointer" title="JSONファイルから読み込み">

    <button class="btn btn-secondary" onclick="clearForm()">🗑 クリア</button>

<div class="wrapper">

  <!-- 基本情報 -->

      <div class="info-cell">

      <div class="legend-item">

      <div class="legend-item">

      <div class="legend-item">
        <div class="legend-badge" style="background:#e6f4ea;color:var(--warn-a)">A</div>
        <span>経過観察</span>
      </div>
    </div>
    <div class="add-row-area">
      <span class="add-row-label">点検箇所を追加：</span>
      <select class="section-select-add" id="add-section-sel">
        <option value="A. 建物外観">A. 建物外観</option>
        <option value="B. 1階貸室">B. 1階貸室</option>
        <option value="C. 階段部">C. 階段部</option>
        <option value="D. 2階貸室">D. 2階貸室</option>

<script>
// ===== DATA =====
function doPrint() { window.print(); }
const INSPECTION_ROWS = [

  { no:5,  loc:'業務用扉',          visuals:true,  touch:true,  content:'破損・劣化・サビ・塗膜劣化' },
  { no:6,  loc:'正面自動ドア',      visuals:true,  touch:true,  content:'破損・劣化・サビ・塗膜劣化' },

  { no:8,  loc:'室内',              visuals:true,  touch:true,  content:'天井・照明・壁・床' },

  { no:10, loc:'階段入口扉',        visuals:true,  touch:true,  content:'破損・劣化・サビ・塗膜劣化' },
  { no:11, loc:'1階踊場',           visuals:true,  touch:true,  content:'天井・照明・壁・床' },
  { no:12, loc:'階段部（1階-2階）', visuals:true,  touch:false, content:'天井・照明・壁・床' },
  { no:13, loc:'2階踊場',           visuals:true,  touch:false, content:'天井・照明・壁・床' },
  { no:14, loc:'階段部（2階-3階）', visuals:true,  touch:false, content:'天井・照明・壁・床' },
  { no:15, loc:'3階踊場',           visuals:true,  touch:false, content:'天井・照明・壁・床' },
  { no:16, loc:'3階出口扉',         visuals:true,  touch:true,  content:'破損・劣化・サビ・塗膜劣化' },
  { section: 'D. 2階貸室' },
  { no:17, loc:'室内',              visuals:true,  touch:true,  content:'天井・照明・壁・床' },
  { no:18, loc:'窓',                visuals:true,  touch:false, content:'取付状態・破損・劣化・サビ' },
  { section: 'E. 3階貸室' },
  { no:19, loc:'通路',              visuals:true,  touch:true,  content:'天井・照明・壁・床' },
  { no:20, loc:'入口扉（向左側）',  visuals:true,  touch:true,  content:'破損・劣化・サビ・塗膜劣化' },
  { no:21, loc:'入口扉（向右側）',  visuals:true,  touch:true,  content:'破損・劣化・サビ・塗膜劣化' },
  { no:22, loc:'室内',              visuals:true,  touch:true,  content:'天井・照明・壁・床' },
  { section: 'F. 屋上' },
  { no:23, loc:'屋上',              visuals:true,  touch:false, content:'壁・床・防水' },
  { no:24, loc:'排水',              visuals:true,  touch:false, content:'劣化・ゴミ詰まり' },
  { no:25, loc:'給排水管',          visuals:true,  touch:false, content:'破損・劣化・サビ' },
  { no:26, loc:'給水タンク',        visuals:true,  touch:true,  content:'破損・劣化・サビ・塗膜劣化' },
  { section: 'G. 敷地内' },
  { no:27, loc:'側溝通路扉',        visuals:true,  touch:true,  content:'破損・劣化・サビ' },
  { no:28, loc:'側溝通路',          visuals:true,  touch:false, content:'コンクリート堺破損・ごみ' },
  { no:29, loc:'立て看板',          visuals:true,  touch:false, content:'破損・劣化・サビ' },
];

let rowCounter = 30;

// ===== MAKE DATA ROW TR =====
function makeDataRow(row) {
  const uid = row.no ? `row-${row.no}` : `row-dyn-${rowCounter++}`;
  const tr = document.createElement('tr');
  tr.dataset.uid = uid;

  // auto-resize textarea helper
  const autoResize = (el) => {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  };

  tr.innerHTML = `
    <td class="col-no" style="text-align:center;color:var(--ink-light);font-size:11px"></td>
    <td class="col-location" data-label="点検箇所"><input type="text" value="${row.loc||''}" placeholder="箇所名"></td>
    <td class="col-method" data-label="点検方法">
      <div class="method-checks">
        <label><input type="checkbox" class="chk-visual" ${row.visuals ? 'checked' : ''}> 目視</label>
        <label><input type="checkbox" class="chk-touch"  ${row.touch  ? 'checked' : ''}> 指触</label>
      </div>
    </td>
    <td class="col-content" data-label="点検内容"><textarea placeholder="点検内容を入力">${row.content||''}</textarea></td>
    <td class="col-status" data-label="問題の有無">
      <div class="status-toggle">
        <button type="button" class="toggle-btn is-ok" onclick="toggleStatus(this)">問題なし</button>
      </div>
    </td>
    <td class="col-level" data-label="問題程度">
      <select class="level-select locked" onchange="updateLevelStyle(this)">
        <option value="">—</option>
        <option value="C">C 緊急</option>
        <option value="B">B 要対処</option>
        <option value="A">A 経過観察</option>
      </select>
    </td>
    <td class="col-photo" data-label="写真">
      <div class="photo-check"><input type="checkbox"></div>
    </td>
    <td class="col-report" data-label="報告事項"><textarea placeholder=""></textarea></td>
    <td class="col-del" data-label=""><button class="del-row-btn" onclick="deleteRow(this)" title="この行を削除">✕</button></td>
  `;

  // auto-resize on input
  tr.querySelectorAll('textarea').forEach(ta => {
    ta.addEventListener('input', () => autoResize(ta));
    setTimeout(() => autoResize(ta), 0);
  });

  return tr;
}

// ===== MAKE SECTION ROW =====
function makeSectionRow(name) {
  const tr = document.createElement('tr');
  tr.className = 'section-row';
  tr.innerHTML = `<td colspan="9">
    <div class="section-cell">
      <input class="section-input" type="text" value="${name}" placeholder="セクション名を入力"
        oninput="refreshSectionDropdown()">
      <button class="del-section-btn" onclick="deleteSection(this)" title="このセクションを削除">🗑 セクション削除</button>
    </div>
  </td>`;
  return tr;
}

// ===== BUILD TABLE =====
function buildTable() {
  const tbody = document.getElementById('inspection-body');
  tbody.innerHTML = '';
  INSPECTION_ROWS.forEach(row => {
    if (row.section !== undefined) {
      tbody.appendChild(makeSectionRow(row.section));
    } else {
      tbody.appendChild(makeDataRow(row));
    }
  });
  renumberRows();
  refreshSectionDropdown();
}

// ===== RENUMBER =====
function renumberRows() {
  let n = 1;
  document.querySelectorAll('#inspection-body tr:not(.section-row)').forEach(tr => {
    tr.querySelector('.col-no').textContent = n++;
  });
}

// ===== REFRESH SECTION DROPDOWN =====
function refreshSectionDropdown() {
  const sel = document.getElementById('add-section-sel');
  if (!sel) return;
  const current = sel.value;
  const sections = [];
  document.querySelectorAll('#inspection-body .section-input').forEach(inp => {
    const v = inp.value.trim();
    if (v) sections.push(v);
  });
  sel.innerHTML = sections.map(s =>
    `<option value="${s}" ${s === current ? 'selected' : ''}>${s}</option>`
  ).join('');
}

// ===== TOGGLE STATUS =====
function toggleStatus(btn) {
  const isOk = btn.classList.contains('is-ok');
  const levelSel = btn.closest('tr').querySelector('.level-select');
  if (isOk) {
    btn.classList.remove('is-ok');
    btn.classList.add('is-ng');
    btn.textContent = '問題あり';
    levelSel.classList.remove('locked');
  } else {
    btn.classList.remove('is-ng');
    btn.classList.add('is-ok');
    btn.textContent = '問題なし';
    levelSel.classList.add('locked');
    levelSel.value = '';
    updateLevelStyle(levelSel);
  }
}

// ===== LEVEL STYLE =====
function updateLevelStyle(sel) {
  if (!sel) return;
  sel.className = 'level-select';
  if (sel.value === 'C') sel.classList.add('level-C');
  else if (sel.value === 'B') sel.classList.add('level-B');
  else if (sel.value === 'A') sel.classList.add('level-A');
}

// ===== DELETE ROW =====
function deleteRow(btn) {
  if (!confirm('この行を削除しますか？')) return;
  btn.closest('tr').remove();
  renumberRows();
}

// ===== DELETE SECTION =====
function deleteSection(btn) {
  const sectionTr = btn.closest('tr');
  const sectionName = sectionTr.querySelector('.section-input').value;
  if (!confirm(`「${sectionName}」のセクションとその中の全行を削除しますか？`)) return;
  // collect rows to delete (until next section or end)
  const toDelete = [sectionTr];
  let next = sectionTr.nextElementSibling;
  while (next && !next.classList.contains('section-row')) {
    toDelete.push(next);
    next = next.nextElementSibling;
  }
  toDelete.forEach(tr => tr.remove());
  renumberRows();
  refreshSectionDropdown();
}

// ===== ADD INSPECTION ROW =====
function addInspectionRow() {
  const tbody = document.getElementById('inspection-body');
  const targetSection = document.getElementById('add-section-sel').value;

  let insertAfter = null;
  let inSection = false;
  Array.from(tbody.rows).forEach(tr => {
    if (tr.classList.contains('section-row')) {
      inSection = (tr.querySelector('.section-input')?.value || '') === targetSection;
    } else if (inSection) {
      insertAfter = tr;
    }
  });

  const newTr = makeDataRow({ loc:'', visuals:true, touch:false, content:'' });
  if (insertAfter) insertAfter.after(newTr);
  else tbody.appendChild(newTr);

  renumberRows();
  newTr.querySelector('input[type=text]').focus();
  newTr.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ===== ADD SECTION =====
function addSectionRow() {
  const name = `新しいセクション`;
  const tbody = document.getElementById('inspection-body');
  const tr = makeSectionRow(name);
  tbody.appendChild(tr);
  tr.querySelector('.section-input').focus();
  tr.querySelector('.section-input').select();
  tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
  refreshSectionDropdown();
}

// ===== PHOTO SLOTS =====
const DEFAULT_PHOTO_CAPTIONS = [
  '', '', '',
  '', '', '',
  '', '', '',
  '', '', '',
];
let photoCount = 0;

function getCurrentRow() {
  const grid = document.getElementById('photo-grid');
  const rows = grid.querySelectorAll('.photo-row');
  const lastRow = rows[rows.length - 1];
  if (!lastRow || lastRow.querySelectorAll('.photo-item').length >= 3) {
    const newRow = document.createElement('div');
    newRow.className = 'photo-row';
    grid.appendChild(newRow);
    return newRow;
  }
  return lastRow;
}

function addPhotoSlot(caption = '') {
  const id = `photo-slot-${photoCount++}`;
  const div = document.createElement('div');
  div.className = 'photo-item';
  div.id = id;
  div.innerHTML = `
    <div class="photo-box" id="box-${id}" data-slot="${id}">
      <div class="photo-placeholder">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>クリックまたはドラッグ&amp;ドロップ</span>
      </div>
      <img id="img-${id}" style="display:none">
      <button class="photo-remove" onclick="removePhoto(event,'${id}')">✕</button>
      <input type="file" accept="image/*" id="file-${id}" style="display:none" onchange="loadPhoto(event,'${id}')">
    </div>
    <div class="photo-caption">
      <input type="text" placeholder="タイトル" value="${caption}">
    </div>
    <button class="photo-slot-del" onclick="deletePhotoSlot('${id}')" title="この写真枠を削除">🗑 枠を削除</button>
  `;
  div.querySelector('.photo-box').addEventListener('click', function(e) {
    if (e.target.closest('.photo-remove')) return;
    if (!this.classList.contains('has-image')) triggerUpload(id);
  });
  getCurrentRow().appendChild(div);
}

// ===== DRAG & DROP — photo-grid全体で委譲管理 =====
function initPhotoDragDrop() {
  const grid = document.getElementById('photo-grid');

  grid.addEventListener('dragover', e => {
    const box = e.target.closest('.photo-box');
    if (!box) return;
    e.preventDefault();
    box.classList.add('drag-over');
  });

  grid.addEventListener('dragleave', e => {
    const box = e.target.closest('.photo-box');
    if (!box) return;
    if (box.contains(e.relatedTarget)) return;
    box.classList.remove('drag-over');
  });

  grid.addEventListener('drop', e => {
    const box = e.target.closest('.photo-box');
    if (!box) return;
    e.preventDefault();
    box.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    const id = box.dataset.slot;
    if (file && file.type.startsWith('image/') && id) {
      loadPhotoFromFile(file, id);
    }
  });
}

function triggerUpload(id) { document.getElementById(`file-${id}`).click(); }

function loadPhoto(event, id) {
  const file = event.target.files[0];
  if (!file) return;
  loadPhotoFromFile(file, id);
}

function loadPhotoFromFile(file, id) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById(`img-${id}`);
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById(`box-${id}`).classList.add('has-image');
  };
  reader.readAsDataURL(file);
}

function removePhoto(event, id) {
  event.stopPropagation();
  const img = document.getElementById(`img-${id}`);
  img.src = ''; img.style.display = 'none';
  document.getElementById(`box-${id}`).classList.remove('has-image');
  document.getElementById(`file-${id}`).value = '';
}

function deletePhotoSlot(id) {
  const item = document.getElementById(id);
  if (!item) return;
  const row = item.closest('.photo-row');
  item.remove();
  // 行が空になったら行ラッパーも削除
  if (row && row.querySelectorAll('.photo-item').length === 0) row.remove();
}

function clearForm() {
  if (!confirm('フォームの内容をすべてクリアしますか？')) return;
  ['prop-name','prop-addr','prop-date','prop-person','remarks'].forEach(id => {
    document.getElementById(id).value = '';
  });
  buildTable();
  document.getElementById('photo-grid').innerHTML = '';
  photoCount = 0;
  DEFAULT_PHOTO_CAPTIONS.forEach(c => addPhotoSlot(c));
  localStorage.removeItem('teiki_report_save');
  showSaveStatus('');
}

// ===== COLLECT / RESTORE DATA =====
function collectData() {
  const data = {
    version: 1,
    basic: {
      name: document.getElementById('prop-name').value,
      addr: document.getElementById('prop-addr').value,
      date: document.getElementById('prop-date').value,
      person: document.getElementById('prop-person').value,
    },
    remarks: document.getElementById('remarks').value,
    rows: [],
    photos: [],
  };

  // table rows
  Array.from(document.querySelectorAll('#inspection-body tr')).forEach(tr => {
    if (tr.classList.contains('section-row')) {
      data.rows.push({ type: 'section', text: tr.querySelector('.section-input')?.value || '' });
    } else {
      const tds = tr.querySelectorAll('td');
      data.rows.push({
        type: 'data',
        loc:     tr.querySelector('.col-location input')?.value || '',
        visual:  tr.querySelector('.chk-visual')?.checked ?? true,
        touch:   tr.querySelector('.chk-touch')?.checked ?? false,
        content: tr.querySelector('.col-content textarea')?.value || '',
        status:  tr.querySelector('.toggle-btn')?.classList.contains('is-ok') ? 'ok' : 'ng',
        level:   tr.querySelector('.level-select')?.value || '',
        photo:   tr.querySelector('.photo-check input')?.checked ?? false,
        report:  tr.querySelector('.col-report textarea')?.value || '',
      });
    }
  });

  // photos
  document.querySelectorAll('.photo-item').forEach(item => {
    const box = item.querySelector('.photo-box');
    const img = item.querySelector('img');
    const cap = item.querySelector('.photo-caption input');
    data.photos.push({
      caption: cap?.value || '',
      src: (box?.classList.contains('has-image') && img?.src) ? img.src : '',
    });
  });

  return data;
}

function restoreData(data) {
  if (!data || data.version !== 1) return;

  // basic info
  document.getElementById('prop-name').value   = data.basic?.name   || '';
  document.getElementById('prop-addr').value   = data.basic?.addr   || '';
  document.getElementById('prop-date').value   = data.basic?.date   || '';
  document.getElementById('prop-person').value = data.basic?.person || '';
  document.getElementById('remarks').value     = data.remarks || '';

  // table
  const tbody = document.getElementById('inspection-body');
  tbody.innerHTML = '';
  (data.rows || []).forEach(r => {
    if (r.type === 'section') {
      tbody.appendChild(makeSectionRow(r.text));
    } else {
      const tr = makeDataRow({
        loc: r.loc, visuals: r.visual, touch: r.touch, content: r.content
      });
      // status
      const btn = tr.querySelector('.toggle-btn');
      const sel = tr.querySelector('.level-select');
      if (r.status === 'ng') {
        btn.classList.replace('is-ok', 'is-ng');
        btn.textContent = '問題あり';
        sel.classList.remove('locked');
      }
      if (r.level) { sel.value = r.level; updateLevelStyle(sel); }
      if (r.photo) tr.querySelector('.photo-check input').checked = true;
      if (r.report) tr.querySelector('.col-report textarea').value = r.report;
      tbody.appendChild(tr);
    }
  });
  renumberRows();
  refreshSectionDropdown();

  // photos
  document.getElementById('photo-grid').innerHTML = '';
  photoCount = 0;
  (data.photos || []).forEach(p => {
    addPhotoSlot(p.caption || '');
    if (p.src) {
      const id = `photo-slot-${photoCount - 1}`;
      const img = document.getElementById(`img-${id}`);
      if (img) {
        img.src = p.src;
        img.style.display = 'block';
        document.getElementById(`box-${id}`)?.classList.add('has-image');
      }
    }
  });
  initPhotoDragDrop();
}

// ===== AUTO-SAVE (localStorage) =====
let saveTimer = null;
function scheduleAutoSave() {
  showSaveStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      const json = JSON.stringify(collectData());
      localStorage.setItem('teiki_report_save', json);
      showSaveStatus('saved');
    } catch(e) {
      showSaveStatus('');
      console.warn('自動保存失敗:', e);
    }
  }, 800);
}

function showSaveStatus(state) {
  const el = document.getElementById('save-status');
  el.className = 'save-status';
  if (state === 'saving') { el.classList.add('saving'); el.textContent = '⏳ 保存中…'; }
  else if (state === 'saved') { el.classList.add('saved'); el.textContent = '✅ 自動保存済み'; }
  else { el.textContent = ''; }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem('teiki_report_save');
    if (!raw) return false;
    restoreData(JSON.parse(raw));
    showSaveStatus('saved');
    return true;
  } catch(e) { return false; }
}

// ===== JSON EXPORT =====
function exportJSON() {
  try {
    const data = collectData();
    const json = JSON.stringify(data, null, 2);
    // createObjectURL はローカルファイルで制限される場合があるため data URI を使用
    const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
    const a = document.createElement('a');
    a.href = dataUri;
    const name = document.getElementById('prop-name').value || '定期巡回報告書';
    const date = document.getElementById('prop-date').value || new Date().toISOString().slice(0,10);
    a.download = `${name}_${date}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch(err) {
    alert('書き出しに失敗しました: ' + err.message);
  }
}

// ===== JSON IMPORT =====
function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    let data;
    try {
      data = JSON.parse(e.target.result);
    } catch(err) {
      alert('JSONファイルの解析に失敗しました。正しいファイルを選択してください。');
      return;
    }
    try {
      restoreData(data);
    } catch(err) {
      alert('データの復元中にエラーが発生しました: ' + err.message);
      return;
    }
    // localStorageへの保存は容量超過で失敗することがあるため別途処理
    try {
      localStorage.setItem('teiki_report_save', e.target.result);
    } catch(e) {
      console.warn('localStorageへの保存をスキップ（容量超過の可能性）:', e);
    }
    showSaveStatus('saved');
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===== ATTACH AUTO-SAVE LISTENERS =====
function attachAutoSaveListeners() {
  document.addEventListener('input', scheduleAutoSave);
  document.addEventListener('change', scheduleAutoSave);
}

// ===== INIT =====
function init() {
  let hadSave = false;
  try {
    hadSave = loadFromStorage();
  } catch(e) {
    console.warn('復元エラー:', e);
    hadSave = false;
  }
  if (!hadSave) {
    buildTable();
    DEFAULT_PHOTO_CAPTIONS.forEach(c => addPhotoSlot(c));
  }
  initPhotoDragDrop();
  attachAutoSaveListeners();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
